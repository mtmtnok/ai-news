<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CatchUP Daily — AIニュースマガジン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fbf8f2;
  --paper-deep:#f1ebe0;
  --ink:#1a1712;
  --ink-soft:#473f35;
  --ink-faint:#736a5d;
  --vermilion:#cf3b25;
  --vermilion-deep:#a82d1a;
  --rule:#d8d0c2;
  --c-model:#2d5d8e;   /* 藍 — 新モデル */
  --c-fund:#3a7a4e;    /* 松葉 — 資金調達 */
  --c-reg:#c0392b;     /* 朱 — 規制 */
  --c-res:#6b4f9e;     /* 菫 — 研究 */
  --c-tool:#c8762a;    /* 柿 — ツール */
  --c-semi:#3d7a80;    /* 青碧 — 半導体 */
  --c-etc:#6e6a61;     /* 鼠 — その他 */
  --serif:"Shippori Mincho","Yu Mincho","Hiragino Mincho ProN",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:var(--paper);
  color:var(--ink);
  line-height:1.75;
  -webkit-tap-highlight-color:rgba(207,59,37,.12);
  /* 和紙の質感 */
  background-image:
    radial-gradient(circle at 15% 20%, rgba(207,59,37,.018), transparent 42%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(29,26,22,.008) 4px);
}
::selection{background:var(--vermilion);color:#fff}
/* 長い無分割文字列の溢れ防止（保険） */
.hero .headline,.card .headline,.modal .headline,.arc-row .t{overflow-wrap:anywhere}

/* ============ マストヘッド ============ */
header{
  max-width:1140px;margin:0 auto;padding:34px 24px 0;
}
.masthead{
  display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;
  padding-bottom:14px;
  border-bottom:3px solid var(--ink);
  position:relative;
}
.masthead::after{
  content:"";position:absolute;left:0;right:0;bottom:-7px;height:1px;background:var(--ink);
}
.brand{display:flex;align-items:center;gap:14px}
.hanko{
  width:52px;height:52px;flex:none;
  background:var(--vermilion);color:#fff;
  font-family:var(--serif);font-weight:800;font-size:19px;line-height:1.15;
  display:flex;align-items:center;justify-content:center;text-align:center;
  border-radius:6px;
  box-shadow:2px 3px 0 rgba(29,26,22,.18);
  letter-spacing:.05em;
}
.brand h1{
  font-family:var(--serif);font-weight:800;font-size:clamp(26px,4.5vw,40px);
  letter-spacing:.02em;line-height:1.1;
}
.brand h1 small{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);letter-spacing:.42em;margin-top:4px}
.issue{
  text-align:right;font-family:var(--serif);color:var(--ink-soft);font-size:13px;line-height:1.5;
}
.issue strong{display:block;font-size:17px;color:var(--ink);font-weight:700}
.issue .map-link{
  display:inline-block;margin-top:5px;font-family:var(--sans);font-size:12.5px;font-weight:700;
  color:var(--vermilion);text-decoration:none;border-bottom:1px dotted var(--vermilion);
}
.issue .map-link:hover{border-bottom-style:solid}

/* ============ コントロールバー ============ */
.controls{
  max-width:1140px;margin:0 auto;padding:16px 24px 6px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  position:sticky;top:0;z-index:40;
  background:linear-gradient(var(--paper) 88%, transparent);
}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{
  font-family:var(--sans);font-size:13px;font-weight:500;
  padding:5px 14px;border-radius:999px;cursor:pointer;
  border:1px solid var(--rule);background:#fffdf9;color:var(--ink-soft);
  transition:all .18s ease;user-select:none;
}
.chip:hover{border-color:var(--ink-faint);transform:translateY(-1px)}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip.star.on{background:var(--vermilion);border-color:var(--vermilion)}
.searchbox{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  background:#fffdf9;border:1px solid var(--rule);border-radius:999px;padding:5px 16px;
  min-width:200px;flex:0 1 250px;
}
.searchbox input{
  border:none;outline:none;background:none;font-family:var(--sans);font-size:13.5px;width:100%;color:var(--ink);
}
.searchbox svg{flex:none;opacity:.45}
.count-line{
  max-width:1140px;margin:0 auto;padding:2px 24px 0;
  font-size:12.5px;color:var(--ink-faint);letter-spacing:.06em;
}

/* ============ セクション ============ */
main{max-width:1140px;margin:0 auto;padding:10px 24px 80px}
.section-title{
  display:flex;align-items:center;gap:14px;margin:36px 0 20px;
}
.section-title h2{
  font-family:var(--serif);font-size:21px;font-weight:700;letter-spacing:.1em;white-space:nowrap;
}
.section-title .bar{height:1px;background:var(--rule);flex:1;position:relative}
.section-title .bar::before{content:"";position:absolute;left:0;top:-1px;width:64px;height:3px;background:var(--vermilion)}
.section-title .sub{font-size:12.5px;color:var(--ink-faint);letter-spacing:.1em;white-space:nowrap}

/* ============ ヒーロー ============ */
.hero{
  display:grid;grid-template-columns:1.6fr 1fr;gap:0;
  background:#fffdf9;border:1px solid var(--rule);
  box-shadow:0 18px 40px -22px rgba(29,26,22,.28);
  cursor:pointer;overflow:hidden;
  transition:transform .25s ease, box-shadow .25s ease;
  animation:rise .6s ease both;
}
.hero:hover{transform:translateY(-3px);box-shadow:0 26px 50px -24px rgba(29,26,22,.4)}
.hero .img{position:relative;min-height:300px;overflow:hidden}
.hero .img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:transform .6s ease}
.hero:hover .img img{transform:scale(1.04)}
.hero .body{padding:30px 32px;display:flex;flex-direction:column;gap:12px;justify-content:center}
.hero .headline{
  font-family:var(--serif);font-weight:800;font-size:clamp(19px,2.4vw,25px);line-height:1.45;
}
.hero .summary{font-size:13.5px;color:var(--ink-soft);line-height:1.85;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.hero .img .ribbon{
  position:absolute;top:16px;left:-4px;z-index:2;
  background:var(--vermilion);color:#fff;
  font-family:var(--serif);font-weight:700;font-size:12.5px;letter-spacing:.18em;
  padding:5px 16px 5px 18px;
  box-shadow:2px 2px 0 rgba(29,26,22,.2);
}

/* ============ カード ============ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:18px;margin-top:18px}

/* ============ 追記日グループ（日付見出し） ============ */
.day-head{grid-column:1/-1;display:flex;align-items:baseline;gap:12px;padding-top:16px;border-top:1px solid var(--rule)}
.day-head:first-child{padding-top:0;border-top:none}
.day-label{font-family:var(--serif);font-weight:700;font-size:16px;letter-spacing:.08em;padding-left:11px;border-left:3px solid var(--vermilion)}
.day-count{font-size:12px;color:var(--ink-faint);letter-spacing:.06em}
#latest-grid > .hero{grid-column:1/-1}
.card{
  background:#fffdf9;border:1px solid var(--rule);overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;
  transition:transform .22s ease, box-shadow .22s ease;
  animation:rise .6s ease both;
}
.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}.card:nth-child(5){animation-delay:.2s}
.card:nth-child(6){animation-delay:.25s}.card:nth-child(7){animation-delay:.3s}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 34px -20px rgba(29,26,22,.35)}
.card .img{position:relative;height:148px;overflow:hidden;flex:none}
.card .img img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.card:hover .img img{transform:scale(1.05)}
.card .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
.card .headline{font-family:var(--serif);font-weight:700;font-size:15px;line-height:1.6}
.card .summary{font-size:12.5px;color:var(--ink-soft);line-height:1.75;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* プレースホルダー画像 */
.ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;
}
.ph span{
  font-family:var(--serif);font-weight:800;color:rgba(255,253,249,.92);
  font-size:30px;letter-spacing:.3em;text-indent:.3em;
  writing-mode:vertical-rl;
  border:1px solid rgba(255,253,249,.4);padding:14px 6px;
}
.ph::after{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.04) 10px,rgba(255,255,255,.04) 20px);
}

/* メタ行 */
.meta{display:flex;align-items:center;gap:8px;font-size:11.5px;flex-wrap:wrap}
.tag{
  font-weight:700;font-size:11px;letter-spacing:.06em;color:#fff;
  padding:2.5px 10px;border-radius:3px;white-space:nowrap;
}
.stars{color:var(--vermilion);font-size:11.5px;letter-spacing:.12em}
.date-label{color:var(--ink-faint);font-family:var(--serif);letter-spacing:.04em}

/* ============ アーカイブ ============ */
.month{margin-bottom:10px;border:1px solid var(--rule);background:#fffdf9}
.month summary{
  list-style:none;cursor:pointer;display:flex;align-items:center;gap:14px;
  padding:13px 20px;user-select:none;transition:background .15s;
}
.month summary::-webkit-details-marker{display:none}
.month summary:hover{background:var(--paper-deep)}
.month summary .m-title{font-family:var(--serif);font-weight:700;font-size:16.5px;letter-spacing:.06em}
.month summary .m-count{font-size:12px;color:var(--ink-faint);letter-spacing:.08em}
.month summary .tri{margin-left:auto;color:var(--ink-faint);transition:transform .25s ease;font-size:11px}
.month[open] summary .tri{transform:rotate(90deg)}
.month[open] summary{border-bottom:1px dashed var(--rule)}
.arc-list{padding:4px 0}
.arc-row{
  display:flex;align-items:baseline;gap:13px;
  padding:9px 20px;text-decoration:none;color:inherit;
  transition:background .12s;border-bottom:1px solid rgba(216,208,194,.5);
}
.arc-row:last-child{border-bottom:none}
.arc-row:hover{background:var(--paper-deep)}
.arc-row .d{font-family:var(--serif);font-size:12.5px;color:var(--ink-soft);flex:none;width:54px;letter-spacing:.03em}
.arc-row .tag{flex:none;transform:translateY(-1px)}
.arc-row .t{font-size:14px;line-height:1.65}
.arc-row.is-rich .t{font-weight:700}
.arc-row .ext{margin-left:auto;flex:none;font-size:10px;color:var(--ink-faint);opacity:0;transition:opacity .15s}
.arc-row:hover .ext{opacity:1}

/* ============ モーダル ============ */
.modal-bg{
  position:fixed;inset:0;background:rgba(29,26,22,.55);backdrop-filter:blur(3px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;
  padding:5vh 18px;overflow-y:auto;
}
.modal-bg.show{display:flex;animation:fade .2s ease}
.modal{
  background:var(--paper);max-width:760px;width:100%;
  border-top:5px solid var(--vermilion);
  box-shadow:0 40px 90px -30px rgba(0,0,0,.5);
  animation:rise .3s ease;
  margin-bottom:5vh;
}
.modal .m-img{max-height:340px;overflow:hidden}
.modal .m-img img{width:100%;display:block;object-fit:cover}
.modal .inner{padding:34px 42px 42px}
.modal .headline{font-family:var(--serif);font-weight:800;font-size:23px;line-height:1.5;margin:10px 0 18px}
.modal .lead{
  font-size:14px;color:var(--ink-soft);line-height:1.9;
  border-left:3px solid var(--vermilion);padding:4px 0 4px 16px;margin-bottom:22px;
}
.modal .content h3{
  font-family:var(--serif);font-size:16px;font-weight:700;letter-spacing:.08em;
  margin:26px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--rule);
  display:flex;align-items:center;gap:8px;
}
.modal .content h3::before{content:"◆";color:var(--vermilion);font-size:11px}
.modal .content p{font-size:14px;margin-bottom:12px;line-height:1.95}
.modal .content ul{padding-left:2px;list-style:none;margin-bottom:12px}
.modal .content li{
  font-size:13.5px;line-height:1.85;padding-left:20px;position:relative;margin-bottom:5px;
}
.modal .content li::before{content:"・";color:var(--vermilion);position:absolute;left:2px;font-weight:700}
.modal .actions{display:flex;gap:10px;margin-top:30px;flex-wrap:wrap}
.btn{
  font-family:var(--sans);font-size:13px;font-weight:700;text-decoration:none;
  padding:9px 22px;border-radius:3px;transition:all .18s;letter-spacing:.05em;
}
.btn.primary{background:var(--ink);color:var(--paper)}
.btn.primary:hover{background:var(--vermilion)}
.btn.ghost{border:1px solid var(--rule);color:var(--ink-soft)}
.btn.ghost:hover{border-color:var(--ink);color:var(--ink)}
.m-close{
  position:sticky;top:10px;float:right;margin:10px 10px 0 0;
  width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;
  background:var(--ink);color:var(--paper);font-size:15px;z-index:5;
  transition:background .15s;
}
.m-close:hover{background:var(--vermilion)}

.empty{
  text-align:center;padding:60px 0;color:var(--ink-faint);font-family:var(--serif);letter-spacing:.1em;
}
footer{
  max-width:1140px;margin:0 auto;padding:26px 24px 50px;
  border-top:1px solid var(--rule);
  font-size:11px;color:var(--ink-faint);letter-spacing:.08em;
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
footer a{color:var(--ink-soft)}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ============ レスポンシブ ============ */
/* タッチ端末：ホバーの貼り付き/カクつきを抑え、アフォーダンスを可視化 */
@media(hover:none){
  .chip:hover,.card:hover,.hero:hover,.month summary:hover,.arc-row:hover{transform:none}
  .hero:hover .img img,.card:hover .img img{transform:none}
  .arc-row .ext{opacity:.65}
}

/* タブレット〜大型phone */
@media(max-width:760px){
  header,.controls,.count-line,main{padding-left:16px;padding-right:16px}
  .hero{grid-template-columns:1fr}
  .hero .img{min-height:200px}
  .hero .body{padding:22px 20px}
  .section-title{gap:10px}
  .section-title .sub{display:none}
  .searchbox{flex:1 1 100%;margin-left:0}
  .modal .inner{padding:26px 22px 34px}
  .arc-row .d{width:46px}
}

/* スマホ：最新号をサムネ左の横長リストに（一覧性確保） */
@media(max-width:560px){
  #latest-grid{display:block}
  .day-head{border-top:none;padding-top:14px}
  .hero,.card{
    display:flex;flex-direction:row;align-items:center;gap:12px;
    border:none;border-bottom:1px solid var(--rule);box-shadow:none;margin:0;
    padding:12px 4px;animation:none;
  }
  .hero{border-left:3px solid var(--vermilion);padding-left:9px}
  .hero .img,.card .img{flex:none;width:92px;height:92px;min-height:0;border-radius:5px;overflow:hidden}
  .hero .body,.card .body{padding:0;gap:5px;justify-content:center;min-width:0}
  .hero .headline,.card .headline{
    font-size:15px;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .hero .summary,.card .summary{display:none}
  .meta{font-size:11px}
  .hero .img .ribbon{top:0;left:0;font-size:9px;padding:2px 5px;letter-spacing:.08em;box-shadow:none}
}

/* 小型phone：コントロールバー横スクロール・タップ拡大・余白調整 */
@media(max-width:480px){
  header{padding-top:22px}
  .hanko{width:46px;height:46px;font-size:17px}
  .brand h1 small{letter-spacing:.18em}
  .issue{text-align:left;flex-basis:100%}
  .controls{padding:12px 14px 6px;gap:8px}
  .chips{flex:1 1 100%;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;padding:9px 15px;font-size:13.5px}
  .searchbox{flex:1 1 100%;margin-left:0;padding:8px 16px}
  .m-close{width:40px;height:40px;font-size:17px}
  .month summary{padding:14px 16px}
  .arc-row{padding:11px 16px}
  .modal-bg{padding:3vh 10px}
  .modal .inner{padding:24px 18px 32px}
  .modal .headline{font-size:20px}
}
</style>
</head>
<body>

<header>
  <div class="masthead">
    <div class="brand">
      <div class="hanko">AI<br>新聞</div>
      <h1>AI CatchUP Daily<small>人工知能業界日報　— AI NEWS MAGAZINE —</small></h1>
    </div>
    <div class="issue">
      <strong id="issue-date"></strong>
      <span id="issue-no"></span>
      <a class="map-link" href="map.html">⇢ AI業界相関図</a>
    </div>
  </div>
</header>

<div class="controls">
  <div class="chips" id="chips">
    <span class="chip on" data-cat="">すべて</span>
    <span class="chip" data-cat="新モデル">新モデル</span>
    <span class="chip" data-cat="資金調達">資金調達</span>
    <span class="chip" data-cat="規制">規制</span>
    <span class="chip" data-cat="研究">研究</span>
    <span class="chip" data-cat="ツール">ツール</span>
    <span class="chip" data-cat="半導体">半導体</span>
    <span class="chip" data-cat="その他">その他</span>
    <span class="chip star" id="star-chip">★★★のみ</span>
  </div>
  <label class="searchbox">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="search" placeholder="キーワード検索…">
  </label>
</div>
<div class="count-line" id="count-line"></div>

<main>
  <section id="latest-section">
    <div class="section-title">
      <h2>最近の記事</h2>
      <div class="bar"></div>
      <span class="sub" id="latest-sub"></span>
    </div>
    <div class="grid" id="latest-grid"></div>
  </section>

  <section id="archive-section">
    <div class="section-title">
      <h2>アーカイブ</h2>
      <div class="bar"></div>
      <span class="sub">全記事一覧 ─ クリックで詳細を表示</span>
    </div>
    <div id="archive-slot"></div>
  </section>
</main>

<footer>
  <span>AI CatchUP Daily — ai-news スキルにより自動生成</span>
  <span>AIニュースを毎日自動収集してお届け</span>
</footer>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<script src="ai_news_data.js"></script>
<script>
const CAT_COLOR = {"新モデル":"var(--c-model)","資金調達":"var(--c-fund)","規制":"var(--c-reg)","研究":"var(--c-res)","ツール":"var(--c-tool)","半導体":"var(--c-semi)","その他":"var(--c-etc)"};
const CAT_KANJI = {"新モデル":"新","資金調達":"資","規制":"規","研究":"研","ツール":"具","その他":"報"};
const DATA = (window.NEWS_DATA || []).slice().sort((a,b)=> (b.date||b.d||"").localeCompare(a.date||a.d||""));
const ARCHIVE = (window.NEWS_ARCHIVE || []).slice().sort((a,b)=> (b.date||b.d||"").localeCompare(a.date||a.d||""));
const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const stars = n => "★★★".slice(0, n) || "★";
const jpDate = iso => { const [y,m,d] = iso.split("-"); return `${y}年${+m}月${+d}日`; };
const wd = iso => "日月火水木金土"[new Date(iso+"T00:00:00").getDay()];

let fCat = "", fStar = false, fQuery = "";

/* ---------- ヘッダー ---------- */
const latestAdded = DATA.length ? DATA.reduce((m,e)=> e.added > m ? e.added : m, DATA[0].added) : null;
// サムネ付きで大きく見せる「最近の記事」= 直近 RECENT_DAYS 日分（追記日ベース）
const RECENT_DAYS = 4;
const recentAdded = new Set([...new Set(DATA.map(e => e.added))].sort().reverse().slice(0, RECENT_DAYS));
document.getElementById("issue-date").textContent = latestAdded ? `${jpDate(latestAdded)}（${wd(latestAdded)}）号` : "";
document.getElementById("issue-no").textContent = `収録 ${DATA.length + ARCHIVE.length} 記事`;

/* ---------- 描画部品 ---------- */
function imgHtml(e, cls){
  const klass = cls ? `img ${cls}` : "img";
  const ph = `<div class="ph" style="background:linear-gradient(135deg, ${CAT_COLOR[e.category]||"var(--c-etc)"}, #2b2823)"><span>${esc(e.category||"ニュース")}</span></div>`;
  if(!e.image) return `<div class="${klass}">${ph}</div>`;
  return `<div class="${klass}"><img src="${esc(e.image)}" alt="" loading="lazy" onerror="this.outerHTML='${ph.replace(/'/g,"&#39;").replace(/"/g,"&quot;")}'"></div>`;
}
function metaHtml(e){
  return `<div class="meta">
    <span class="tag" style="background:${CAT_COLOR[e.category]||"var(--c-etc)"}">${esc(e.category)}</span>
    <span class="stars">${stars(e.importance)}</span>
    <span class="date-label">${jpDate(e.date)}</span>
  </div>`;
}
function matches(title, cat, imp, extra){
  if(fCat && cat !== fCat) return false;
  if(fStar && imp !== 3) return false;
  if(fQuery){
    const hay = (title + " " + (extra||"") + " " + cat).toLowerCase();
    if(!hay.includes(fQuery)) return false;
  }
  return true;
}

/* ---------- 最近の記事（直近数日分・追記日ごと・サムネ付き） ---------- */
function render(){
  const latest = DATA.filter(e => recentAdded.has(e.added) && matches(e.title, e.category, e.importance, e.summary));
  const grid = document.getElementById("latest-grid");

  // 追記日ごとにグループ化（新しい日が先）
  const byAdded = {};
  latest.forEach(e => { (byAdded[e.added] = byAdded[e.added] || []).push(e); });
  const days = Object.keys(byAdded).sort().reverse();

  // 全体のヒーロー＝最新追記日の最重要1本
  const heroId = days.length
    ? byAdded[days[0]].slice().sort((a,b)=> b.importance - a.importance || b.date.localeCompare(a.date))[0].id
    : null;

  document.getElementById("latest-sub").textContent = latest.length ? `直近${recentAdded.size}日分・${latest.length}本` : "";

  grid.innerHTML = days.map(day => {
    const items = byAdded[day].slice().sort((a,b)=> b.importance - a.importance || b.date.localeCompare(a.date));
    const cards = items.map(e => e.id === heroId ? heroHtml(e) : cardHtml(e)).join("");
    return `<div class="day-head"><span class="day-label">${jpDate(day)}（${wd(day)}）</span><span class="day-count">${items.length}本</span></div>${cards}`;
  }).join("");

  // ヒーロー画像にリボンを挿入
  const heroImg = grid.querySelector(".hero .img");
  if(heroImg) heroImg.insertAdjacentHTML("afterbegin", '<span class="ribbon">本日の一面</span>');

  document.getElementById("latest-section").style.display = latest.length ? "" : "none";
  renderArchive();
  updateCount(latest.length);
}
function cardHtml(e){
  return `<article class="card" onclick="openModal('${e.id}')">
    ${imgHtml(e)}
    <div class="body">
      ${metaHtml(e)}
      <div class="headline">${esc(e.title)}</div>
      <div class="summary">${esc(e.summary)}</div>
    </div>
  </article>`;
}
function heroHtml(e){
  return `<article class="hero" onclick="openModal('${e.id}')">
    ${imgHtml(e)}
    <div class="body">
      ${metaHtml(e)}
      <div class="headline">${esc(e.title)}</div>
      <div class="summary">${esc(e.summary)}</div>
    </div>
  </article>`;
}

/* ---------- アーカイブ ---------- */
function renderArchive(){
  // リッチ記事もアーカイブ一覧に含める（一覧性確保・モーダルで開く）
  const rows = [
    ...DATA.map(e => ({t:e.title, d:e.date, c:e.category, imp:e.importance, rich:true, id:e.id, extra:e.summary})),
    ...ARCHIVE.map(a => ({t:a.title||a.t, d:a.date||a.d, c:a.category||a.c, imp:a.importance||0, rich:!!a.content, id:a.id||a.n, extra:a.summary}))
  ].filter(r => matches(r.t, r.c, r.imp || (fStar ? -1 : 0), r.extra))
   .sort((a,b)=> b.d.localeCompare(a.d));

  const byMonth = {};
  rows.forEach(r => { const k = r.d.slice(0,7); (byMonth[k] = byMonth[k] || []).push(r); });
  const months = Object.keys(byMonth).sort().reverse();

  document.getElementById("archive-slot").innerHTML = months.length ? months.map((m,i) => {
    const [y,mo] = m.split("-");
    const list = byMonth[m].map(r => {
      if(r.rich){
        return `<a class="arc-row is-rich" href="javascript:openModal('${r.id}')">
          <span class="d">${+r.d.slice(8,10)}日</span>
          <span class="tag" style="background:${CAT_COLOR[r.c]||"var(--c-etc)"}">${esc(r.c)}</span>
          <span class="t">${esc(r.t)}</span>
          <span class="ext">記事 ↗</span>
        </a>`;
      }
      return `<div class="arc-row is-plain">
        <span class="d">${+r.d.slice(8,10)}日</span>
        <span class="tag" style="background:${CAT_COLOR[r.c]||"var(--c-etc)"}">${esc(r.c)}</span>
        <span class="t">${esc(r.t)}</span>
        <span class="ext">—</span>
      </div>`;
    }).join("");
    return `<details class="month" ${i===0?"open":""}>
      <summary>
        <span class="m-title">${y}年${+mo}月</span>
        <span class="m-count">${byMonth[m].length}件</span>
        <span class="tri">▶</span>
      </summary>
      <div class="arc-list">${list}</div>
    </details>`;
  }).join("") : '<div class="empty">該当する記事がありません</div>';
}

function updateCount(richShown){
  const total = DATA.length + ARCHIVE.length;
  const active = fCat || fStar || fQuery;
  document.getElementById("count-line").textContent = active
    ? `絞り込み中 — 条件に一致する記事を表示しています（全${total}件中）`
    : `全${total}件のニュースを収録（特集 ${DATA.length} 件・アーカイブ ${ARCHIVE.length} 件）`;
}

/* ---------- モーダル ---------- */
function mdToHtml(md){
  const lines = (md||"").split("\n");
  let html = "", inUl = false;
  for(const raw of lines){
    const line = raw.trim();
    if(!line){ if(inUl){html+="</ul>";inUl=false;} continue; }
    if(line.startsWith("## ")){ if(inUl){html+="</ul>";inUl=false;} html += `<h3>${esc(line.slice(3))}</h3>`; }
    else if(line.startsWith("- ") || line.startsWith("・")){
      if(!inUl){html+="<ul>";inUl=true;}
      html += `<li>${esc(line.replace(/^(-\s|・)/,""))}</li>`;
    }
    else { if(inUl){html+="</ul>";inUl=false;} html += `<p>${esc(line)}</p>`; }
  }
  if(inUl) html += "</ul>";
  return html;
}
function openModal(id){
  const e = DATA.find(x => x.id === id) || ARCHIVE.find(x => x.id === id);
  if(!e) return;
  const m = document.getElementById("modal");
  const bg = document.getElementById("modal-bg");
  m.innerHTML = `
    <button class="m-close" onclick="closeModal()" aria-label="閉じる">✕</button>
    ${e.image ? `<div class="m-img"><img src="${esc(e.image)}" alt="" onerror="this.parentElement.style.display='none'"></div>` : ""}
    <div class="inner">
      ${metaHtml(e)}
      <div class="headline">${esc(e.title)}</div>
      <div class="lead">${esc(e.summary)}</div>
      <div class="content">${e.content ? mdToHtml(e.content) : mdToHtml((e.points||[]).map(p=>"- "+p).join("\n"))}</div>
      <div class="actions">
        ${e.url ? `<a class="btn primary" href="${esc(e.url)}" target="_blank" rel="noopener">元記事を読む ↗</a>` : ""}
      </div>
    </div>`;
  bg.scrollTop = 0;
  m.scrollTop = 0;
  bg.classList.add("show");
  requestAnimationFrame(() => {
    bg.scrollTop = 0;
    m.scrollTop = 0;
  });
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("modal-bg").classList.remove("show");
  document.body.style.overflow = "";
}
document.getElementById("modal-bg").addEventListener("click", e => { if(e.target.id === "modal-bg") closeModal(); });
document.addEventListener("keydown", e => { if(e.key === "Escape") closeModal(); });

/* ---------- フィルタ ---------- */
document.getElementById("chips").addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if(!chip) return;
  if(chip.id === "star-chip"){
    fStar = !fStar;
    chip.classList.toggle("on", fStar);
  } else {
    fCat = chip.dataset.cat;
    document.querySelectorAll(".chip[data-cat]").forEach(c => c.classList.toggle("on", c === chip));
  }
  render();
});
let debounce;
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(debounce);
  debounce = setTimeout(()=>{ fQuery = e.target.value.trim().toLowerCase(); render(); }, 180);
});

render();
</script>
</body>
</html>
