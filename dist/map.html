<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI業界相関図 — AI CatchUP Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fbf8f2;
  --ink:#1a1712;
  --ink-soft:#473f35;
  --ink-faint:#736a5d;
  --vermilion:#cf3b25;
  --rule:#d8d0c2;
  --serif:"Shippori Mincho","Yu Mincho","Hiragino Mincho ProN",serif;
  --sans:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.7;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(207,59,37,.018), transparent 42%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(29,26,22,.008) 4px);
}
header{max-width:1120px;margin:0 auto;padding:22px 24px 12px;border-bottom:2px solid var(--ink);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hanko{
  width:46px;height:46px;flex:none;background:var(--vermilion);color:#fff;
  font-family:var(--serif);font-weight:800;font-size:16px;line-height:1.15;
  display:flex;align-items:center;justify-content:center;text-align:center;
  border-radius:6px;box-shadow:2px 3px 0 rgba(29,26,22,.18);
}
header h1{font-family:var(--serif);font-weight:800;font-size:clamp(20px,3.4vw,27px);letter-spacing:.04em}
header h1 small{display:block;font-size:10.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.3em;margin-top:2px}
.back{
  margin-left:auto;font-size:13px;font-weight:700;color:var(--vermilion);
  text-decoration:none;border:1px solid var(--rule);background:#fffdf9;
  border-radius:999px;padding:6px 16px;white-space:nowrap;
}
.back:hover{border-color:var(--vermilion)}
/* タブ */
.tabs{max-width:1120px;margin:0 auto;padding:14px 24px 0;display:flex;gap:8px;flex-wrap:wrap}
.tab{
  font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;user-select:none;
  padding:9px 20px;border:1px solid var(--rule);border-bottom:none;background:#f3efe6;color:var(--ink-faint);
  border-radius:10px 10px 0 0;transition:all .15s ease;
}
.tab small{font-weight:500;opacity:.75;margin-left:5px}
.tab.on{background:#fffdf9;color:var(--ink);border-color:var(--ink);box-shadow:0 -3px 0 var(--vermilion) inset}
.tab:hover:not(.on){color:var(--ink-soft)}
main{max-width:1120px;margin:0 auto;padding:0 24px 60px}
.view{display:none;border:1px solid var(--rule);border-radius:0 10px 10px 10px;background:#fffdf9;
  padding:18px 18px 22px;position:relative}
.view.on{display:block}
.caption{font-size:12.5px;color:var(--ink-faint);margin:0 4px 10px;display:flex;gap:16px;flex-wrap:wrap}
.caption b{color:var(--ink-soft)}
.svgwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.svgwrap svg{display:block;min-width:900px;width:100%;height:auto}
svg text{font-family:"Zen Kaku Gothic New","Yu Gothic",Meiryo,sans-serif}
.ribbon{cursor:pointer;transition:opacity .12s ease}
.ribbon:hover{opacity:.9 !important}
.nbox{cursor:pointer}
.pedge{cursor:pointer;transition:all .12s ease}
.pedge:hover{stroke-opacity:.95;stroke-width:4}
/* 詳細パネル */
#panel{
  position:fixed;top:84px;right:18px;z-index:30;width:350px;max-width:calc(100vw - 32px);
  max-height:calc(100vh - 110px);overflow-y:auto;
  background:#fffdf9;border:1px solid var(--rule);border-radius:10px;
  box-shadow:0 18px 40px -18px rgba(29,26,22,.4);
  padding:18px 20px;display:none;
}
#panel.show{display:block}
#panel h2{font-family:var(--serif);font-size:17.5px;font-weight:800;margin-bottom:2px;padding-right:26px}
#panel .gname{font-size:11.5px;color:var(--ink-faint);letter-spacing:.1em;margin-bottom:8px}
#panel .close{position:absolute;top:10px;right:12px;border:none;background:none;cursor:pointer;
  font-size:18px;color:var(--ink-faint);line-height:1;padding:4px}
.rel{border-top:1px solid var(--rule);padding:10px 0}
.rel .head{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.rel .tchip{font-size:10.5px;font-weight:700;color:#fff;border-radius:999px;padding:1px 9px;white-space:nowrap}
.rel .peer{font-size:13px;font-weight:700}
.rel .dt{font-size:11px;color:var(--ink-faint);margin-left:auto;white-space:nowrap}
.rel .desc{font-size:12.5px;line-height:1.65;color:var(--ink-soft)}
.rel a{font-size:11.5px;color:var(--vermilion);text-decoration:none;border-bottom:1px dotted var(--vermilion)}
.status{display:inline-flex;align-items:center;border:1px solid var(--rule);border-radius:999px;padding:1px 7px;font-size:10px;font-weight:700;color:var(--ink-soft);background:#faf7f0}
.method{margin:0 4px 14px;padding:10px 12px;border-left:3px solid var(--vermilion);background:#faf7f0;color:var(--ink-soft);font-size:12px;line-height:1.65}
/* M&A・人材のカード */
.magrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.macard{border:1px solid var(--rule);border-radius:10px;background:#fff;overflow:hidden}
.macard .mahead{display:flex;align-items:center;gap:9px;padding:10px 14px;color:#fff;font-weight:800;font-size:15.5px}
.macard .mahead .cnt{margin-left:auto;font-size:11.5px;font-weight:600;opacity:.85}
.matgt{padding:11px 14px;border-top:1px solid var(--rule)}
.matgt .trow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.matgt .arrow{color:var(--ink-faint);font-weight:700}
.matgt .tname{font-weight:700;font-size:14px}
.matgt .badge{font-size:10px;font-weight:700;color:#fff;background:#c98a2d;border-radius:999px;padding:1px 8px}
.matgt .dt{font-size:11px;color:var(--ink-faint);margin-left:auto}
.matgt .desc{font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin-top:3px}
.matgt a{font-size:11.5px;color:var(--vermilion);text-decoration:none;border-bottom:1px dotted var(--vermilion)}
.tlist{display:flex;flex-direction:column;gap:12px}
.trow2{border:1px solid var(--rule);border-radius:10px;background:#fff;padding:13px 16px;
  display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.trow2 .move{display:flex;align-items:center;gap:9px;flex:none}
.cbox{display:inline-flex;align-items:center;gap:6px;color:#fff;font-weight:700;font-size:13px;
  border-radius:7px;padding:5px 12px;white-space:nowrap}
.tarrow{font-size:19px;color:var(--vermilion);font-weight:700}
.trow2 .who{flex:1;min-width:230px}
.trow2 .who b{font-size:14.5px}
.trow2 .who p{font-size:12.5px;color:var(--ink-soft);line-height:1.6}
.trow2 .meta{font-size:11px;color:var(--ink-faint);text-align:right;flex:none}
.trow2 a{font-size:11.5px;color:var(--vermilion);text-decoration:none;border-bottom:1px dotted var(--vermilion)}
.hino{display:inline-block;width:13px;height:13px;border-radius:50%;background:#fff;position:relative;flex:none;border:1px solid rgba(0,0,0,.12)}
.hino::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--vermilion)}
/* 半導体シェア（工程別） */
.sstage{margin:4px 0 20px;border:1px solid var(--rule);border-radius:12px;background:#fff;overflow:hidden}
.sstage > h3{padding:9px 16px;color:#fff;font-family:var(--serif);font-size:15px;font-weight:700;letter-spacing:2.5px;background:#3d7a80}
.sseg{padding:13px 18px 15px;border-top:1px solid var(--rule)}
.sseg:first-of-type{border-top:none}
.sseg .shead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.sseg .shead b{font-size:14.5px}
.sseg .shead .asof{font-size:11px;color:var(--ink-faint)}
.sseg .shead a{margin-left:auto;font-size:11.5px;color:var(--vermilion);text-decoration:none;border-bottom:1px dotted var(--vermilion);white-space:nowrap}
.sbar{display:flex;height:38px;border-radius:7px;overflow:hidden;margin:9px 0 8px;border:1px solid var(--rule)}
.sbar > div{display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;min-width:2px}
.slegend{display:flex;gap:5px 15px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);align-items:center}
.slegend .li{display:inline-flex;align-items:center;gap:5px}
.slegend i{width:10px;height:10px;border-radius:3px;display:inline-block;flex:none}
.snote{font-size:11.5px;color:var(--ink-faint);line-height:1.65;margin-top:7px}
.sstagenote{padding:10px 18px;font-size:11.5px;color:var(--ink-faint);line-height:1.6;border-top:1px solid var(--rule);background:#faf7f0}
footer{max-width:1120px;margin:0 auto;padding:12px 24px 40px;
  font-size:11.5px;color:var(--ink-faint);display:flex;gap:14px;flex-wrap:wrap}
@media (max-width:720px){
  header{padding:14px 14px 10px}
  .tabs,main{padding-left:12px;padding-right:12px}
  .tab{padding:8px 12px;font-size:12.5px}
  #panel{top:auto;bottom:0;left:0;right:0;width:100%;max-width:100%;max-height:46vh;border-radius:14px 14px 0 0}
}
</style>
</head>
<body>

<header>
  <div class="hanko">相関<br>図</div>
  <h1>AI業界相関図<small>出資・提携・買収・人材の流れ</small></h1>
  <a class="back" href="index.html">⇠ ニュースへ戻る</a>
</header>

<div class="tabs" id="tabs"></div>
<main id="views"></main>

<aside id="panel">
  <button class="close" onclick="closePanel()" aria-label="閉じる">✕</button>
  <div id="panel-body"></div>
</aside>

<footer>
  <span>最終更新: <span id="updated"></span>（毎週土曜に自動更新）</span>
  <span>各関係に出典リンク付き。公式発表を優先し、報道段階の案件は明示します。</span>
  <span><span class="hino" style="vertical-align:-2px"></span> ＝ 日本企業</span>
</footer>

<script src="relations_data.js"></script>
<script src="semi_share_data.js"></script>
<script>
const R = window.RELATIONS;
document.getElementById("updated").textContent = R.updated;

const SECTOR = {
  lab:    { name:"AIラボ",             color:"#cf3b25" },
  cloud:  { name:"ビッグテック・クラウド", color:"#2d5d8e" },
  semi:   { name:"半導体",             color:"#3d7a80" },
  app:    { name:"応用・スタートアップ",  color:"#c8762a" },
  invest: { name:"投資家・ファンド",     color:"#6b4f9e" }
};
const SUBNAME = { design:"設計", fab:"製造", memdev:"メモリ・装置" };
const TYPES = {
  invest:  { name:"出資・調達", color:"#3a7a4e" },
  partner: { name:"提携・供給", color:"#2d5d8e" },
  ma:      { name:"買収・合併", color:"#c0392b" },
  talent:  { name:"人材移籍",   color:"#6b4f9e" }
};
const N = {}; R.nodes.forEach(n => N[n.id] = n);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const nm = id => (N[id] || {label:id}).label;
const scol = id => SECTOR[(N[id]||{}).sector]?.color || "#6e6a61";
const fmtOku = v => v >= 100 ? `${(v/100).toLocaleString("ja-JP",{maximumFractionDigits:1})}兆円級（約${v.toLocaleString()}億ドル）`.replace(/^.*（/, "約").replace(/）$/,"") : `約${v}億ドル`;
const amtText = v => v == null ? "金額非公表" : `約${v.toLocaleString()}億ドル`;

// SVG部品: 日の丸マーク
const hinoSvg = (x, y) =>
  `<circle cx="${x}" cy="${y}" r="6.5" fill="#fff" stroke="rgba(0,0,0,.15)"/><circle cx="${x}" cy="${y}" r="3.2" fill="#cf3b25"/>`;

// ═══════════ 詳細パネル ═══════════
const panel = document.getElementById("panel");
const pbody = document.getElementById("panel-body");
function closePanel(){ panel.classList.remove("show"); }
function relHtml(e){
  const t = TYPES[e.type];
  const dir = e.type === "partner" ? "×" : "→";
  return `<div class="rel">
    <div class="head">
      <span class="tchip" style="background:${t.color}">${t.name}</span>
      <span class="peer">${esc(nm(e.from))} ${dir} ${esc(nm(e.to))}</span>
      <span class="dt">${esc(e.date)}</span>${e.status === "reported" ? '<span class="status">報道・未確定</span>' : ""}
    </div>
    ${e.person ? `<div class="desc"><b>${esc(e.person)}</b></div>` : ""}
    <div class="desc">${esc(e.label)}</div>
    <a href="${esc(e.source)}" target="_blank" rel="noopener">出典を読む ↗</a>
  </div>`;
}
function showEdges(title, sub, edges){
  pbody.innerHTML = `<h2>${esc(title)}</h2><div class="gname">${esc(sub)}</div>` + edges.map(relHtml).join("");
  panel.classList.add("show");
}
window.closePanel = closePanel;
window.__showNode = (id, type) => {
  const es = R.edges.filter(e => e.type === type && (e.from === id || e.to === id))
    .sort((a,b) => a.date < b.date ? 1 : -1);
  showEdges(nm(id), `${SECTOR[N[id].sector].name}・${TYPES[type].name} ${es.length}件`, es);
};
window.__showEdge = i => showEdges(`${nm(R.edges[i].from)} と ${nm(R.edges[i].to)}`, TYPES[R.edges[i].type].name, [R.edges[i]]);

// ═══════════ タブ1: 出資・調達（資金フロー） ═══════════
function renderInvest(el){
  const es = R.edges.map((e,i)=>({...e, _i:i})).filter(e => e.type === "invest");
  const disp = e => e.amount ?? 15;
  const agg = (key) => {
    const m = new Map();
    es.forEach(e => {
      const id = e[key];
      if (!m.has(id)) m.set(id, { id, edges: [], total: 0, known: 0, hasNull: false });
      const o = m.get(id);
      o.edges.push(e); o.total += disp(e);
      if (e.amount == null) o.hasNull = true; else o.known += e.amount;
    });
    return [...m.values()].sort((a,b) => b.total - a.total);
  };
  const L = agg("from"), Rt = agg("to");
  const sum = arr => arr.reduce((s,o) => s + o.total, 0);
  const s = 430 / Math.max(sum(L), sum(Rt));
  const GAP = 16, TOP = 64, BW = 236, LX = 26, RX = 778;
  const place = arr => { let y = TOP; arr.forEach(o => { o.h = Math.max(38, o.total * s); o.y = y; y += o.h + GAP; }); return y; };
  const H = Math.max(place(L), place(Rt)) + 20;

  // 帯のスロット割り当て（相手のy順に積む）
  const slot = (arr, key) => arr.forEach(o => {
    const others = key === "from" ? Rt : L;
    const yOf = e => (others.find(x => x.id === e[key === "from" ? "to" : "from"]) || {y:0}).y;
    const sorted = [...o.edges].sort((a,b) => yOf(a) - yOf(b));
    const T = sorted.reduce((t,e) => t + Math.max(4, disp(e)*s), 0);
    const f = Math.min(1, (o.h - 8) / T);
    let acc = o.y + 4 + (o.h - 8 - T*f) / 2;
    sorted.forEach(e => {
      const t = Math.max(4, disp(e)*s) * f;
      e[key === "from" ? "_ly" : "_ry"] = acc + t/2;
      if (key === "from") e._lt = t; else e._rt = t;
      acc += t;
    });
  });
  slot(L, "from"); slot(Rt, "to");

  const ribbons = es.map(e => {
    const t = Math.max(3.5, Math.min(e._lt, e._rt));
    const dash = e.amount == null ? `stroke-dasharray="7 6"` : "";
    return `<path class="ribbon" onclick="__showEdge(${e._i})" d="M ${LX+BW} ${e._ly} C 520 ${e._ly}, 520 ${e._ry}, ${RX} ${e._ry}"
      fill="none" stroke="#3a7a4e" stroke-opacity=".42" stroke-width="${t}" ${dash}>
      <title>${esc(nm(e.from))} → ${esc(nm(e.to))}: ${esc(amtText(e.amount))}</title></path>`;
  }).join("");

  const box = (o, x, side) => {
    const n = N[o.id];
    const totalTxt = o.known > 0 ? `計${amtText(o.known).replace("約","約")}${o.hasNull ? "＋非公表分" : ""}` : "金額非公表";
    const cy = o.y + o.h/2;
    return `<g class="nbox" onclick="__showNode('${o.id}','invest')">
      <rect x="${x}" y="${o.y}" width="${BW}" height="${o.h}" rx="8" fill="${scol(o.id)}"/>
      <text x="${x+16}" y="${cy - 4}" font-size="16" font-weight="700" fill="#fff">${esc(n.label)}</text>
      <text x="${x+16}" y="${cy + 15}" font-size="11.5" fill="rgba(255,255,255,.85)">${side==="L"?"出資":"調達"} ${totalTxt}</text>
      ${n.jp ? hinoSvg(x + BW - 18, o.y + 15) : ""}
    </g>`;
  };

  el.innerHTML = `
    <div class="caption"><b>資金の流れ</b><span>帯の太さ＝公表金額の概算</span><span>点線＝金額非公表</span><span>クリックで詳細・出典</span></div>
    <div class="method">金額は各発表・報道時点のコミット額／累計額です。条件付き投資、評価額、契約総額は区別して詳細に記載しています。</div>
    <div class="svgwrap"><svg viewBox="0 0 1040 ${H}" role="img" aria-label="出資・資金調達のフロー図">
      <text x="${LX}" y="34" font-size="13" font-weight="700" fill="#736a5d" letter-spacing="3">出し手（投資家・事業会社）</text>
      <text x="${RX}" y="34" font-size="13" font-weight="700" fill="#736a5d" letter-spacing="3">受け手（調達側）</text>
      ${ribbons}
      ${L.map(o => box(o, LX, "L")).join("")}
      ${Rt.map(o => box(o, RX, "R")).join("")}
    </svg></div>`;
}

// ═══════════ タブ2: 提携・供給（業界レイヤー地図） ═══════════
function renderPartner(el){
  const es = R.edges.map((e,i)=>({...e, _i:i})).filter(e => e.type === "partner");
  const used = new Set(); es.forEach(e => { used.add(e.from); used.add(e.to); });
  const idsOf = (sector, sub) => R.nodes
    .filter(n => used.has(n.id) && n.sector === sector && (sub ? n.sub === sub : true))
    .map(n => n.id);

  const zones = [
    { sector:"app",  rows:[{ ids: idsOf("app") }] },
    { sector:"lab",  rows:[{ ids: idsOf("lab") }] },
    { sector:"cloud",rows:[{ ids: idsOf("cloud") }] },
    { sector:"semi", rows:[
        { sub:"design", ids: idsOf("semi","design") },
        { sub:"fab",    ids: idsOf("semi","fab") },
        { sub:"memdev", ids: idsOf("semi","memdev") }
      ].filter(r => r.ids.length) },
    { sector:"invest", rows:[{ ids: idsOf("invest") }] }
  ].filter(z => z.rows.some(r => r.ids.length));

  // 座標: 行ごとにY、ゾーンに背景
  const W = 1040, XL = 96, XR = 1020, NH = 44, ROWH = 84, ZPAD = 34, ZGAP = 22;
  let y = 14;
  const rows = [];
  zones.forEach(z => {
    z.y0 = y; y += ZPAD;
    z.rows.forEach(r => { r.y = y + (ROWH - NH)/2; r.zone = z; rows.push(r); y += ROWH; });
    z.y1 = y + 4; y = z.y1 + ZGAP;
  });
  const H = y;

  // ノード幅と初期X
  const wOf = id => 30 + [...nm(id)].reduce((s,ch) => s + (ch.charCodeAt(0) > 255 ? 15.5 : 9.5), 0) + (N[id].jp ? 16 : 0);
  const placeRow = r => {
    const tw = r.ids.reduce((s,id) => s + wOf(id), 0);
    const gap = Math.max(14, (XR - XL - tw) / (r.ids.length + 1));
    let x = XL + gap;
    r.pos = {};
    r.ids.forEach(id => { r.pos[id] = { x, w: wOf(id), cx: x + wOf(id)/2, y: r.y }; x += wOf(id) + gap; });
  };
  rows.forEach(placeRow);
  const posOf = id => { for (const r of rows) if (r.pos[id]) return r.pos[id]; return null; };

  // バリセンタ法で交差を減らす（4回）
  for (let it = 0; it < 4; it++) rows.forEach(r => {
    const bary = id => {
      const ps = es.filter(e => e.from === id || e.to === id)
        .map(e => posOf(e.from === id ? e.to : e.from)).filter(Boolean);
      return ps.length ? ps.reduce((s,p) => s + p.cx, 0) / ps.length : posOf(id).cx;
    };
    r.ids.sort((a,b) => bary(a) - bary(b));
    placeRow(r);
  });

  const edges = es.map(e => {
    let a = posOf(e.from), b = posOf(e.to);
    if (!a || !b) return "";
    let d;
    if (Math.abs(a.y - b.y) < 2) { // 同一行 → 上に弧
      const y0 = a.y, top = y0 - 40;
      d = `M ${a.cx} ${y0} C ${a.cx} ${top}, ${b.cx} ${top}, ${b.cx} ${y0}`;
    } else {
      if (a.y > b.y) [a, b] = [b, a];
      const y1 = a.y + NH, y2 = b.y, dy = (y2 - y1) * .5;
      d = `M ${a.cx} ${y1} C ${a.cx} ${y1 + dy}, ${b.cx} ${y2 - dy}, ${b.cx} ${y2}`;
    }
    return `<path class="pedge" onclick="__showEdge(${e._i})" d="${d}" fill="none"
      stroke="#2d5d8e" stroke-opacity=".5" stroke-width="2.6">
      <title>${esc(nm(e.from))} × ${esc(nm(e.to))}</title></path>`;
  }).join("");

  const zoneBg = zones.map(z => {
    const c = SECTOR[z.sector].color;
    const subs = z.rows.length > 1 ? z.rows.map(r =>
      `<text x="30" y="${r.y + NH/2 + 4}" font-size="11.5" font-weight="700" fill="${c}" opacity=".8">${SUBNAME[r.sub]}</text>` +
      (r !== z.rows[z.rows.length-1] ? `<line x1="24" y1="${r.y + ROWH - 6}" x2="${W-24}" y2="${r.y + ROWH - 6}" stroke="${c}" stroke-opacity=".18" stroke-dasharray="4 5"/>` : "")
    ).join("") : "";
    return `<rect x="10" y="${z.y0}" width="${W-20}" height="${z.y1 - z.y0}" rx="12" fill="${c}" fill-opacity=".055" stroke="${c}" stroke-opacity=".22"/>
      <text x="26" y="${z.y0 + 22}" font-size="13" font-weight="800" fill="${c}" letter-spacing="2.5">${SECTOR[z.sector].name}</text>${subs}`;
  }).join("");

  const nodesSvg = rows.map(r => r.ids.map(id => {
    const p = r.pos[id], n = N[id];
    return `<g class="nbox" onclick="__showNode('${id}','partner')">
      <rect x="${p.x}" y="${p.y}" width="${p.w}" height="${NH}" rx="8" fill="${scol(id)}"/>
      <text x="${p.x + (n.jp ? 24 : 14)}" y="${p.y + NH/2 + 5.5}" font-size="15" font-weight="700" fill="#fff">${esc(n.label)}</text>
      ${n.jp ? hinoSvg(p.x + 14, p.y + NH/2) : ""}
    </g>`;
  }).join("")).join("");

  el.innerHTML = `
    <div class="caption"><b>業界レイヤー地図</b><span>上流（応用）→ 下流（半導体・資金）の階層で配置</span><span>線＝提携・供給契約</span><span>クリックで詳細・出典</span></div>
    <div class="method">公式発表を優先して収録。供給開始前の容量計画も含むため、各線の詳細で発表日・実施内容を確認できます。</div>
    <div class="svgwrap"><svg viewBox="0 0 ${W} ${H}" role="img" aria-label="提携・供給の業界レイヤー地図">
      ${zoneBg}${edges}${nodesSvg}
    </svg></div>`;
}

// ═══════════ タブ3: 買収・合併（買収マップ） ═══════════
function renderMA(el){
  const es = R.edges.map((e,i)=>({...e, _i:i})).filter(e => e.type === "ma");
  const byAcq = new Map();
  es.forEach(e => { if (!byAcq.has(e.from)) byAcq.set(e.from, []); byAcq.get(e.from).push(e); });
  const groups = [...byAcq.entries()].sort((a,b) => Math.max(...b[1].map(e=>+e.date.replace("-",""))) - Math.max(...a[1].map(e=>+e.date.replace("-",""))));
  el.innerHTML = `
    <div class="caption"><b>買収マップ</b><span>買い手ごとに集約（新しい順）</span></div>
    <div class="magrid">` + groups.map(([acq, list]) => `
      <div class="macard">
        <div class="mahead" style="background:${scol(acq)}">
          ${N[acq]?.jp ? '<span class="hino"></span>' : ""}${esc(nm(acq))}
          <span class="cnt">${list.length}件</span>
        </div>
        ${list.sort((a,b) => a.date < b.date ? 1 : -1).map(e => `
        <div class="matgt">
          <div class="trow">
            <span class="arrow">→</span><span class="tname">${esc(nm(e.to))}</span>
            ${e.status === "reported" ? '<span class="badge">報道・未確定</span>' : ""}
            <span class="dt">${esc(e.date)}</span>
          </div>
          <div class="desc">${esc(e.label)}</div>
          <a href="${esc(e.source)}" target="_blank" rel="noopener">出典を読む ↗</a>
        </div>`).join("")}
      </div>`).join("") + `</div>`;
}

// ═══════════ タブ4: 人材移籍 ═══════════
function renderTalent(el){
  const es = R.edges.map((e,i)=>({...e, _i:i})).filter(e => e.type === "talent")
    .sort((a,b) => a.date < b.date ? 1 : -1);
  el.innerHTML = `
    <div class="caption"><b>人材の移籍</b><span>主要研究者・経営者の移動（新しい順）</span></div>
    <div class="tlist">` + es.map(e => `
      <div class="trow2">
        <div class="move">
          <span class="cbox" style="background:${scol(e.from)}">${N[e.from]?.jp ? '<span class="hino"></span>' : ""}${esc(nm(e.from))}</span>
          <span class="tarrow">→</span>
          <span class="cbox" style="background:${scol(e.to)}">${N[e.to]?.jp ? '<span class="hino"></span>' : ""}${esc(nm(e.to))}</span>
        </div>
        <div class="who"><b>${esc(e.person || "")}</b><p>${esc(e.label)}</p></div>
        <div class="meta">${esc(e.date)}<br><a href="${esc(e.source)}" target="_blank" rel="noopener">出典 ↗</a></div>
      </div>`).join("") + `</div>`;
}

// ═══════════ タブ5: 半導体シェア（工程別） ═══════════
const BARCOLS = ["#2d5d8e","#3d7a80","#c8762a","#3a7a4e","#6b4f9e","#c0392b","#8a6d3b"];
function renderSemiShare(el){
  const S = window.SEMI_SHARE;
  if (!S) { el.innerHTML = "<p>シェアデータ（semi_share_data.js）を読み込めませんでした。</p>"; return; }
  el.innerHTML = `
    <div class="caption"><b>半導体 工程別シェア</b><span>設計→装置→素材→製造→メモリ→後工程の順</span><span>数値は調査会社・決算ベースの概算（${esc(S.updated)}時点の調査）</span></div>`
    + S.stages.map(stage => `
    <div class="sstage">
      <h3>${esc(stage.name)}</h3>
      ${stage.segments.map(seg => {
        let ci = 0;
        const cols = seg.items.map(it => it.company === "その他" ? "#b6ad9c" : BARCOLS[ci++ % BARCOLS.length]);
        return `
        <div class="sseg">
          <div class="shead"><b>${esc(seg.name)}</b><span class="asof">${esc(seg.asOf)}</span>
            <a href="${esc(seg.sourceUrl)}" target="_blank" rel="noopener">出典: ${esc(seg.sourceName)} ↗</a></div>
          <div class="sbar">${seg.items.map((it,i) =>
            `<div style="width:${it.share}%;background:${cols[i]}" title="${esc(it.company)} ${it.share}%">${it.share >= 13 ? esc(it.company) + " " + it.share + "%" : (it.share >= 6 ? it.share + "%" : "")}</div>`).join("")}</div>
          <div class="slegend">${seg.items.map((it,i) =>
            `<span class="li"><i style="background:${cols[i]}"></i>${it.jp ? '<span class="hino"></span>' : ""}${esc(it.company)} ${it.share}%</span>`).join("")}</div>
          ${seg.note ? `<div class="snote">※ ${esc(seg.note)}</div>` : ""}
        </div>`;
      }).join("")}
      ${stage.note ? `<div class="sstagenote">※ ${esc(stage.note)}</div>` : ""}
    </div>`).join("");
}

// ═══════════ タブ制御 ═══════════
const TABS = [
  { key:"partner", name:"提携・供給", note:"業界マップ", render: renderPartner },
  { key:"invest",  name:"出資・調達", note:"資金フロー", render: renderInvest },
  { key:"ma",      name:"買収・合併", note:"買収マップ", render: renderMA },
  { key:"talent",  name:"人材移籍",   note:"移籍リスト", render: renderTalent },
  { key:"share",   name:"半導体シェア", note:"工程別", render: renderSemiShare }
];
const tabsEl = document.getElementById("tabs");
const viewsEl = document.getElementById("views");
TABS.forEach(t => {
  t.count = t.key === "share"
    ? (window.SEMI_SHARE ? window.SEMI_SHARE.stages.reduce((s,x) => s + x.segments.length, 0) : 0)
    : R.edges.filter(e => e.type === t.key).length;
  t.btn = document.createElement("div");
  t.btn.className = "tab";
  t.btn.innerHTML = `${t.name}<small>${t.note}・${t.count}</small>`;
  t.btn.onclick = () => activate(t.key, true);
  tabsEl.appendChild(t.btn);
  t.view = document.createElement("div");
  t.view.className = "view";
  viewsEl.appendChild(t.view);
});
function activate(key, push){
  closePanel();
  TABS.forEach(t => {
    const on = t.key === key;
    t.btn.classList.toggle("on", on);
    t.view.classList.toggle("on", on);
    if (on && !t.rendered) { t.render(t.view); t.rendered = true; }
  });
  if (push) history.replaceState(null, "", "#" + key);
}
activate(TABS.some(t => t.key === location.hash.slice(1)) ? location.hash.slice(1) : "partner", false);
</script>
